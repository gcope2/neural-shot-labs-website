<!doctype html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for neural-shot-labs-website">
  <meta name="theme-color" content="white">
  <meta name="author" content="Neural Shot Labs">

  <title>Neural Shot Labs Website</title>

  <style>
    :root, html, body {
      background-color: light-dark(
        #121212,
        black
      );
      color: #FFFFFF;
    }

    html, body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    body {
      margin: 0;
      padding: 0;

      width: 100%;
      min-height: 100%;

      background: #050505;

      overflow-x: hidden;
    }
    
    /* Chrome, Edge, Safari */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(227, 24, 55, 0.75);

      border-radius: 999px;

      border: 2px solid #050505;

      transition:
        background 0.25s ease,
        box-shadow 0.25s ease;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #E31837;

      box-shadow:
        0 0 10px rgba(227, 24, 55, 0.45);
    }

    /* Firefox */
    html {
      scrollbar-width: thin;
      scrollbar-color: #E31837 #050505;
    }
  </style>
</head>

<body>
  <div>
    <neural-shot-labs-website></neural-shot-labs-website>
  </div>
  <script type="module" src="./neural-shot-labs-website.js"></script>
</body>
</html>
